<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnStationBD - Premium Micro-Task Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d6efd; --secondary-color: #25d366; --dark-bg: #111827; }
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Arial, sans-serif; color: #374151; }
        .hidden { display: none !important; }
        .auth-bg { background: linear-gradient(135deg, #1e3a8a, #4f46e5); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 450px; }
        
        /* আপনার আগের ডিজাইন স্টাইল */
        .hero-area { background: linear-gradient(135deg, #1e3a8a, #4f46e5); color: white; padding: 100px 0; text-align: center; }
        .section-title { font-size: 32px; font-weight: 700; color: #1f2937; margin-bottom: 30px; text-align: center; }
        .info-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; height: 100%; }
        .footer-dark { background: var(--dark-bg); color: #9ca3af; padding: 60px 0 30px; }
        .sticky-whatsapp { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; z-index: 999; text-decoration: none; }
    </style>
</head>
<body>

<div id="authSection" class="auth-bg">
    <div class="auth-box">
        <h3 class="text-center mb-4 fw-bold text-primary">EarnStationBD</h3>
        <ul class="nav nav-pills nav-justified mb-4">
            <li class="nav-item"><a class="nav-link active" id="loginTab" onclick="switchTab('login')">লগইন</a></li>
            <li class="nav-item"><a class="nav-link" id="regTab" onclick="switchTab('reg')">রেজিস্ট্রেশন</a></li>
        </ul>
        <form id="loginForm">
            <input type="text" class="form-control mb-3" id="loginPhone" placeholder="আপনার ফোন নম্বর" required>
            <button type="submit" class="btn btn-primary w-100">লগইন করুন</button>
        </form>
        <form id="regForm" class="hidden">
            <input type="text" class="form-control mb-3" name="Name" placeholder="আপনার নাম" required>
            <input type="text" class="form-control mb-3" name="Phone" placeholder="আপনার ফোন নম্বর" required>
            <input type="text" class="form-control mb-3" name="Referrer" id="refCode" placeholder="রেফারার আইডি">
            <button type="submit" class="btn btn-success w-100">একাউন্ট তৈরি করুন</button>
        </form>
    </div>
</div>

<div id="mainContent" class="hidden">
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-primary" href="#">EarnStationBD</a>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">লগ-আউট</button>
        </div>
    </nav>

    <div class="hero-area">
        <h1>EarnStationBD তে স্বাগতম</h1>
    </div>

    <div class="container my-5" id="tasks">
        <h2 class="section-title">আমাদের কাজসমূহ</h2>
        <div class="row g-4">
            <div class="col-lg-4"><div class="info-card"><h5>ফেসবুক</h5><p>১৫ টাকা</p></div></div>
            <div class="col-lg-4"><div class="info-card"><h5>ইনস্টাগ্রাম</h5><p>২০ টাকা</p></div></div>
            <div class="col-lg-4"><div class="info-card"><h5>হোয়াটসঅ্যাপ</h5><p>২৫ টাকা</p></div></div>
        </div>
    </div>

    <footer class="footer-dark text-center">© 2026 EarnStationBD</footer>
    <a href="https://whatsapp.com/channel/0029Vb7NKxuIN9ip9ZKupE0q" class="sticky-whatsapp"><i class="fab fa-whatsapp"></i> সাপোর্ট</a>
</div>

<script>
// ফর্ম সুইচিং
function switchTab(type) {
    document.getElementById('loginForm').classList.toggle('hidden', type !== 'login');
    document.getElementById('regForm').classList.toggle('hidden', type !== 'reg');
    document.getElementById('loginTab').classList.toggle('active', type === 'login');
    document.getElementById('regTab').classList.toggle('active', type === 'reg');
}

// লগইন
document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    localStorage.setItem('userPhone', document.getElementById('loginPhone').value);
    location.reload();
});

// লগআউট
function logout() {
    localStorage.removeItem('userPhone');
    location.reload();
}

// অটো-লগইন চেক
window.onload = function() {
    if (localStorage.getItem('userPhone')) {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
    }
};

// রেজিস্ট্রেশন (শিটে ডাটা পাঠানো)
document.getElementById('regForm').addEventListener('submit', function(e) {
    e.preventDefault();
    fetch('YOUR_GOOGLE_SCRIPT_URL_HERE', { method: 'POST', mode: 'no-cors', body: new FormData(this)})
    .then(() => { alert('একাউন্ট তৈরি হয়েছে!'); switchTab('login'); });
});
</script>
</body>
</html>
